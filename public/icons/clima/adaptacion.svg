<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="20" fill="#26A69A"/>
  <!-- House with flood waves icon -->
  <g transform="translate(100, 75)" fill="white">
    <!-- House roof -->
    <polygon points="0,-40 -35,-5 -25,-5 -25,15 25,15 25,-5 35,-5"/>
    <!-- Waves below house -->
    <path d="M-45,25 C-35,18 -25,32 -15,25 C-5,18 5,32 15,25 C25,18 35,32 45,25" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M-45,40 C-35,33 -25,47 -15,40 C-5,33 5,47 15,40 C25,33 35,47 45,40" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Label -->
  <text x="100" y="175" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">Adaptaci&#xF3;n</text>
</svg>
